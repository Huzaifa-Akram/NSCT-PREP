<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NSCS Revision Quiz</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Serif:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#102A43",
              sea: "#0E7490",
              mint: "#14B8A6",
              sand: "#F5E6CA",
              coral: "#EF4444",
            },
            fontFamily: {
              heading: ["Space Grotesk", "sans-serif"],
              body: ["IBM Plex Serif", "serif"],
            },
            boxShadow: {
              soft: "0 20px 45px -20px rgba(16, 42, 67, 0.35)",
            },
          },
        },
      };
    </script>

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="min-h-screen bg-slate-50 text-ink font-body">
    <div class="bg-art fixed inset-0 -z-10"></div>

    <main class="w-full px-4 py-8 sm:px-6 lg:px-10 xl:px-14 2xl:px-20">
      <header
        class="mb-8 overflow-hidden rounded-3xl border border-white/10 bg-white/5 p-6 shadow-soft backdrop-blur-sm sm:p-8 lg:p-10"
      >
        <p
          class="mb-2 inline-block rounded-full bg-sea/10 px-3 py-1 text-xs font-semibold tracking-wide text-sea"
        >
          NSCS PREP
        </p>
        <h1
          class="font-heading text-3xl font-bold leading-tight sm:text-4xl lg:text-5xl 2xl:text-6xl"
        >
          Revision Quiz Notebook
        </h1>
        <p
          class="mt-3 max-w-5xl text-base text-slate-400 lg:text-xl 2xl:text-2xl"
        >
          Save and revisit your NSCS practice questions. No grading system, just
          fast revision with instant answer reveal.
        </p>

        <div
          class="mt-5 flex flex-wrap gap-2"
          role="tablist"
          aria-label="Question Tabs"
        >
          <button
            id="tab-btn-mcq"
            class="tab-btn tab-btn-active"
            type="button"
            role="tab"
            aria-controls="tab-mcq"
            aria-selected="true"
          >
            MCQ Bank
          </button>
          <button
            id="tab-btn-networking"
            class="tab-btn"
            type="button"
            role="tab"
            aria-controls="tab-networking"
            aria-selected="false"
          >
            Networking MCQS
          </button>
          <button
            id="tab-btn-dsa"
            class="tab-btn"
            type="button"
            role="tab"
            aria-controls="tab-dsa"
            aria-selected="false"
          >
            DSA MCQ
          </button>
          <button
            id="tab-btn-os"
            class="tab-btn"
            type="button"
            role="tab"
            aria-controls="tab-os"
            aria-selected="false"
          >
            Operating System MCQS
          </button>
          <button
            id="tab-btn-ai"
            class="tab-btn"
            type="button"
            role="tab"
            aria-controls="tab-ai"
            aria-selected="false"
          >
            AI MCQS
          </button>
          <button
            id="tab-btn-database"
            class="tab-btn"
            type="button"
            role="tab"
            aria-controls="tab-database"
            aria-selected="false"
          >
            Database MCQS
          </button>
          <button
            id="tab-btn-web"
            class="tab-btn"
            type="button"
            role="tab"
            aria-controls="tab-web"
            aria-selected="false"
          >
            Web MCQS
          </button>
        </div>
      </header>

      <section id="tab-mcq" class="space-y-5">
        <div>
          <section
            class="mb-6 grid grid-cols-1 gap-3 rounded-2xl border border-white/10 bg-white/5 p-4 shadow-soft backdrop-blur-sm sm:grid-cols-2"
          >
            <button id="new-random-mcq" class="action-btn w-full" type="button">
              Shuffle MCQ Order
            </button>
            <button
              id="toggle-all-answers"
              class="action-btn alt-btn w-full"
              type="button"
            >
              Show Answers For All
            </button>
          </section>
          <section id="mcq-container" class="space-y-5"></section>
        </div>
      </section>

      <section id="tab-networking" class="space-y-5 hidden">
        <div>
          <section
            class="mb-6 grid grid-cols-1 gap-3 rounded-2xl border border-white/10 bg-white/5 p-4 shadow-soft backdrop-blur-sm sm:grid-cols-2"
          >
            <button
              id="new-random-networking"
              class="action-btn w-full"
              type="button"
            >
              Shuffle MCQ Order
            </button>
            <button
              id="toggle-all-networking-answers"
              class="action-btn alt-btn w-full"
              type="button"
            >
              Show Answers For All
            </button>
          </section>
          <section id="networking-container" class="space-y-5"></section>
        </div>
      </section>

      <section id="tab-dsa" class="space-y-5 hidden">
        <div>
          <section id="dsa-container" class="space-y-5"></section>
        </div>
      </section>

      <section id="tab-os" class="space-y-5 hidden">
        <div>
          <section
            class="mb-6 grid grid-cols-1 gap-3 rounded-2xl border border-white/10 bg-white/5 p-4 shadow-soft backdrop-blur-sm sm:grid-cols-2"
          >
            <button id="new-random-os" class="action-btn w-full" type="button">
              Shuffle MCQ Order
            </button>
            <button
              id="toggle-all-os-answers"
              class="action-btn alt-btn w-full"
              type="button"
            >
              Show Answers For All
            </button>
          </section>
          <section id="os-container" class="space-y-5"></section>
        </div>
      </section>

      <section id="tab-ai" class="space-y-5 hidden">
        <div>
          <section
            class="mb-6 grid grid-cols-1 gap-3 rounded-2xl border border-white/10 bg-white/5 p-4 shadow-soft backdrop-blur-sm sm:grid-cols-2"
          >
            <button id="new-random-ai" class="action-btn w-full" type="button">
              Shuffle MCQ Order
            </button>
            <button
              id="toggle-all-ai-answers"
              class="action-btn alt-btn w-full"
              type="button"
            >
              Show Answers For All
            </button>
          </section>
          <section id="ai-container" class="space-y-5"></section>
        </div>
      </section>

      <section
        id="tab-database"
        class="space-y-5 hidden"
        role="tabpanel"
        aria-labelledby="tab-btn-database"
      >
        <div>
          <section
            class="mb-6 grid grid-cols-1 gap-3 rounded-2xl border border-white/10 bg-white/5 p-4 shadow-soft backdrop-blur-sm sm:grid-cols-2"
          >
            <button
              id="new-random-database"
              class="action-btn w-full"
              type="button"
            >
              Shuffle MCQ Order
            </button>
            <button
              id="toggle-all-database-answers"
              class="action-btn alt-btn w-full"
              type="button"
            >
              Show Answers For All
            </button>
          </section>
          <section id="database-container" class="space-y-5"></section>
        </div>
      </section>

      <section
        id="tab-web"
        class="space-y-5 hidden"
        role="tabpanel"
        aria-labelledby="tab-btn-web"
      >
        <div>
          <section
            class="mb-6 grid grid-cols-1 gap-3 rounded-2xl border border-white/10 bg-white/5 p-4 shadow-soft backdrop-blur-sm sm:grid-cols-2"
          >
            <button id="new-random-web" class="action-btn w-full" type="button">
              Shuffle MCQ Order
            </button>
            <button
              id="toggle-all-web-answers"
              class="action-btn alt-btn w-full"
              type="button"
            >
              Show Answers For All
            </button>
          </section>
          <section id="web-container" class="space-y-5"></section>
        </div>
      </section>
    </main>

    <template id="mcq-template">
      <article class="question-card">
        <div class="mb-4 flex items-start justify-between gap-4">
          <h3 class="question-title font-heading text-xl font-bold"></h3>
          <span class="question-tag">MCQ</span>
        </div>
        <p class="question-prompt mb-4 text-base leading-7"></p>
        <div class="options mb-4 space-y-3"></div>
        <div class="flex items-center justify-between gap-3">
          <button type="button" class="show-answer-btn action-btn alt-btn">
            Show Answer
          </button>
          <p class="result-msg text-sm font-semibold"></p>
        </div>
        <div
          class="answer-box mt-4 hidden rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm leading-6 text-slate-700"
        ></div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
