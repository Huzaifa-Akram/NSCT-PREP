<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NSCS Revision Quiz</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Serif:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#102A43",
              sea: "#0E7490",
              mint: "#14B8A6",
              sand: "#F5E6CA",
              coral: "#EF4444",
            },
            fontFamily: {
              heading: ["Space Grotesk", "sans-serif"],
              body: ["IBM Plex Serif", "serif"],
            },
            boxShadow: {
              soft: "0 20px 45px -20px rgba(16, 42, 67, 0.35)",
            },
          },
        },
      };
    </script>

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="min-h-screen bg-slate-50 text-ink font-body">
    <div class="bg-art fixed inset-0 -z-10"></div>

    <main class="w-full px-4 py-8 sm:px-6 lg:px-10 xl:px-14 2xl:px-20">
      <header
        class="mb-8 overflow-hidden rounded-3xl border border-white/10 bg-white/5 p-6 shadow-soft backdrop-blur-sm sm:p-8 lg:p-10"
      >
        <p
          class="mb-2 inline-block rounded-full bg-sea/10 px-3 py-1 text-xs font-semibold tracking-wide text-sea"
        >
          NSCS PREP
        </p>
        <h1
          class="font-heading text-3xl font-bold leading-tight sm:text-4xl lg:text-5xl 2xl:text-6xl"
        >
          Revision Quiz Notebook
        </h1>
        <p
          class="mt-3 max-w-5xl text-base text-slate-700 lg:text-xl 2xl:text-2xl"
        >
          Save and revisit your NSCS practice questions. No grading system, just
          fast revision with instant answer reveal.
        </p>

        <div
          class="mt-5 flex flex-wrap gap-2"
          role="tablist"
          aria-label="Question Tabs"
        >
          <button
            id="tab-btn-mcq"
            class="tab-btn tab-btn-active"
            type="button"
            role="tab"
            aria-controls="tab-mcq"
            aria-selected="true"
          >
            MCQ Bank
          </button>
          <button
            id="tab-btn-networking"
            class="tab-btn"
            type="button"
            role="tab"
            aria-controls="tab-networking"
            aria-selected="false"
          >
            Networking MCQS
          </button>
          <button
            id="tab-btn-text"
            class="tab-btn"
            type="button"
            role="tab"
            aria-controls="tab-text"
            aria-selected="false"
          >
            Text Questions
          </button>
          <button
            id="tab-btn-dsa"
            class="tab-btn"
            type="button"
            role="tab"
            aria-controls="tab-dsa"
            aria-selected="false"
          >
            DSA MCQ
          </button>
        </div>
      </header>

      <section id="tab-mcq" class="space-y-5">
        <div>
          <section
            class="mb-6 grid grid-cols-1 gap-3 rounded-2xl border border-white/10 bg-white/5 p-4 shadow-soft backdrop-blur-sm sm:grid-cols-2"
          >
            <button id="new-random-mcq" class="action-btn w-full" type="button">
              Shuffle MCQ Order
            </button>
            <button
              id="toggle-all-answers"
              class="action-btn alt-btn w-full"
              type="button"
            >
              Show Answers For All
            </button>
          </section>

          <section id="mcq-container" class="space-y-5"></section>
        </div>
      </section>

      <section id="tab-networking" class="space-y-5 hidden">
        <div>
          <section
            class="mb-6 grid grid-cols-1 gap-3 rounded-2xl border border-white/10 bg-white/5 p-4 shadow-soft backdrop-blur-sm sm:grid-cols-2"
          >
            <button
              id="new-random-networking"
              class="action-btn w-full"
              type="button"
            >
              Shuffle MCQ Order
            </button>
            <button
              id="toggle-all-networking-answers"
              class="action-btn alt-btn w-full"
              type="button"
            >
              Show Answers For All
            </button>
          </section>
          <section id="networking-container" class="space-y-5"></section>
        </div>
      </section>

      <section id="tab-dsa" class="space-y-5 hidden">
        <div>
          <section id="dsa-container" class="space-y-5"></section>
        </div>
      </section>

      <section id="tab-text" class="space-y-5 hidden">
        <section class="space-y-5">
          <div
            class="rounded-2xl border border-white/10 bg-white/5 p-4 shadow-soft backdrop-blur-sm lg:p-6"
          >
            <h2 class="font-heading text-xl font-semibold lg:text-3xl">
              Text-Based Questions
            </h2>
            <p class="mt-2 text-sm text-slate-700 lg:text-lg">
              Type your answer in the editor strip and reveal the expected
              answer anytime.
            </p>
          </div>
          <div id="text-container" class="space-y-5"></div>
        </section>
      </section>
    </main>

    <template id="mcq-template">
      <article class="question-card">
        <div class="mb-4 flex items-start justify-between gap-3">
          <h2
            class="font-heading text-xl font-semibold question-title lg:text-2xl"
          ></h2>
          <span class="question-tag">MCQ</span>
        </div>
        <p class="mb-4 text-base text-slate-700 question-prompt lg:text-lg"></p>
        <div class="options space-y-2"></div>
        <div class="mt-4 flex flex-wrap items-center gap-2">
          <button class="show-answer-btn action-btn" type="button">
            Show Answer
          </button>
          <span class="result-msg text-sm font-semibold"></span>
        </div>
        <div
          class="answer-box mt-3 hidden rounded-xl border border-mint/30 bg-mint/10 px-3 py-2 text-sm"
        ></div>
      </article>
    </template>

    <template id="text-template">
      <article class="question-card">
        <div class="mb-4 flex items-start justify-between gap-3">
          <h2
            class="font-heading text-xl font-semibold question-title lg:text-2xl"
          ></h2>
          <span class="question-tag bg-amber-100 text-amber-700">TEXT</span>
        </div>
        <p class="mb-4 text-base text-slate-700 question-prompt lg:text-lg"></p>
        <div class="editor-shell mb-3">
          <div class="editor-toolbar"></div>
          <div class="editor-area"></div>
        </div>
        <div class="mt-4">
          <button class="show-answer-btn action-btn" type="button">
            Show Answer
          </button>
        </div>
        <div
          class="answer-box mt-3 hidden rounded-xl border border-sky-300/50 bg-sky-50 px-3 py-2 text-sm"
        ></div>
      </article>
    </template>

    <button id="theme-toggle" type="button">🌙</button>
    <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
    <script src="app.js" defer></script>
  </body>
</html>
